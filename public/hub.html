<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control Hub</title>
  <link rel="stylesheet" href="style.css">
  <style>
    main { max-width: 1200px; }

    /* Top tab bar */
    .hub-tabs { display: flex; gap: 0; border-bottom: 1px solid #21262d; padding: 0 2rem; background: #0d1117; }
    .hub-tab { background: none; border: none; color: #8b949e; padding: 0.75rem 1.25rem; font-size: 0.9rem; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; }
    .hub-tab:hover { color: #c9d1d9; }
    .hub-tab.active { color: #f0f6fc; border-bottom-color: #58a6ff; }

    .hub-section { display: none; }
    .hub-section.active { display: block; }

    /* ── Payouts styles ── */
    .mission-block { background: #161b22; border: 1px solid #21262d; border-radius: 0.5rem; margin-bottom: 1.5rem; overflow: hidden; }
    .mission-header { padding: 1rem 1.25rem; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
    .mission-title { font-weight: 600; color: #f0f6fc; font-size: 1rem; }
    .mission-meta { font-size: 0.8rem; color: #8b949e; }
    .mission-status { padding: 0.2rem 0.6rem; border-radius: 1rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
    .mission-status.active { background: #0d3820; color: #3fb950; }
    .mission-status.closed { background: #3d2e00; color: #d29922; }
    .mission-status.exported { background: #1c2541; color: #58a6ff; }

    .pay-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .pay-table th { text-align: left; padding: 0.6rem 1rem; color: #8b949e; font-weight: 600; border-bottom: 1px solid #21262d; font-size: 0.75rem; text-transform: uppercase; }
    .pay-table td { padding: 0.6rem 1rem; border-bottom: 1px solid #21262d; }
    .pay-table tr:last-child td { border-bottom: none; }
    .pay-table tr:hover { background: #1c2128; }

    .score { font-weight: 600; }
    .score.high { color: #3fb950; }
    .score.mid { color: #d29922; }
    .score.low { color: #8b949e; }

    .wallet-addr { font-family: monospace; font-size: 0.75rem; color: #8b949e; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .referred-badge { background: #1c2541; color: #58a6ff; padding: 0.15rem 0.5rem; border-radius: 0.75rem; font-size: 0.7rem; }
    .no-wallet { color: #f85149; font-size: 0.75rem; }

    .payout-input, .score-input { width: 80px; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 0.3rem 0.5rem; border-radius: 0.25rem; font-size: 0.85rem; text-align: right; }
    .payout-input:focus, .score-input:focus { border-color: #58a6ff; outline: none; }
    .score-input { width: 52px; }
    .score-saved { color: #3fb950; font-size: 0.7rem; opacity: 0; transition: opacity 0.3s; }
    .score-saved.show { opacity: 1; }

    .btn { padding: 0.3rem 0.75rem; border: none; border-radius: 0.25rem; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
    .btn-pay { background: #238636; color: #fff; }
    .btn-pay:hover { background: #2ea043; }
    .btn-pay:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    .btn-export { background: #1c2541; color: #58a6ff; border: 1px solid #30363d; padding: 0.5rem 1rem; }
    .btn-export:hover { background: #253255; }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 0.375rem; }

    .payout-result { font-size: 0.75rem; margin-left: 0.5rem; }
    .payout-result.ok { color: #3fb950; }
    .payout-result.err { color: #f85149; }

    .url-link { color: #58a6ff; text-decoration: none; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; }
    .url-link:hover { text-decoration: underline; }

    .empty-state { padding: 2rem; text-align: center; color: #484f58; }
    .empty-state h3 { color: #c9d1d9; margin-bottom: 0.5rem; }

    .filter-bar { display: flex; gap: 0.75rem; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
    .filter-bar select, .filter-bar input { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 0.4rem 0.6rem; border-radius: 0.25rem; font-size: 0.85rem; }

    /* ── Engagement styles ── */
    .eng-nav { display: flex; gap: 0; border-bottom: 1px solid #21262d; margin-bottom: 1rem; }
    .eng-nav-btn { background: none; border: none; color: #8b949e; padding: 0.6rem 1rem; font-size: 0.85rem; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; }
    .eng-nav-btn:hover { color: #c9d1d9; }
    .eng-nav-btn.active { color: #f0f6fc; border-bottom-color: #58a6ff; }

    .eng-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .eng-header .meta-text { font-size: 0.8rem; color: #8b949e; }

    .eng-filter-bar { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 320px; }
    .search-input { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 0.5rem 0.75rem; border-radius: 0.375rem; font-size: 0.85rem; outline: none; padding-right: 2rem; }
    .search-input:focus { border-color: #58a6ff; }
    .search-clear { position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); color: #8b949e; cursor: pointer; font-size: 1.1rem; line-height: 1; padding: 0.2rem; }
    .search-clear:hover { color: #f0f6fc; }

    .filter-pills { display: flex; gap: 0.25rem; }
    .pill { background: none; border: 1px solid #30363d; border-radius: 1rem; color: #8b949e; padding: 0.3rem 0.75rem; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
    .pill:hover { color: #c9d1d9; border-color: #8b949e; }
    .pill.active { background: #21262d; color: #f0f6fc; border-color: #58a6ff; }

    .sort-control { display: flex; align-items: center; gap: 0.4rem; }
    .sort-label { font-size: 0.75rem; color: #8b949e; }
    .sort-select { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 0.3rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; min-width: 140px; }
    .result-count { font-size: 0.75rem; color: #8b949e; margin-left: auto; white-space: nowrap; }

    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }

    .mission-card, .partner-card { background: #161b22; border: 1px solid #21262d; border-radius: 0.5rem; padding: 1.25rem; cursor: pointer; transition: border-color 0.2s, transform 0.1s; }
    .mission-card:hover, .partner-card:hover { border-color: #58a6ff; transform: translateY(-1px); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
    .card-title { font-size: 1rem; font-weight: 600; color: #f0f6fc; flex: 1; margin-right: 0.5rem; }
    .card-handle { font-size: 0.8rem; color: #8b949e; margin-top: 0.15rem; }

    .score-badge { padding: 0.2rem 0.6rem; border-radius: 1rem; font-size: 0.8rem; font-weight: 700; min-width: 36px; text-align: center; }
    .score-high { background: #0d3820; color: #3fb950; border: 1px solid #238636; }
    .score-mid { background: #3d2e00; color: #d29922; border: 1px solid #9e6a03; }
    .score-low { background: #3d1418; color: #f85149; border: 1px solid #da3633; }

    .card-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
    .stat { text-align: center; }
    .stat-value { font-size: 1.1rem; font-weight: 600; color: #f0f6fc; }
    .stat-label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }
    .card-meta { margin-top: 0.75rem; font-size: 0.75rem; color: #8b949e; display: flex; justify-content: space-between; }

    .status-tag { padding: 0.1rem 0.4rem; border-radius: 0.25rem; font-size: 0.7rem; text-transform: uppercase; font-weight: 600; }
    .status-active { background: #0d3820; color: #3fb950; }
    .status-closed { background: #3d2e00; color: #d29922; }
    .status-exported { background: #21262d; color: #8b949e; }

    .detail-stats { display: flex; gap: 1.5rem; margin: 1rem 0; flex-wrap: wrap; }
    .detail-stats .stat { background: #161b22; border: 1px solid #21262d; border-radius: 0.5rem; padding: 0.75rem 1rem; min-width: 100px; }

    .data-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    .data-table th { text-align: left; padding: 0.6rem 0.75rem; border-bottom: 1px solid #30363d; color: #8b949e; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    .data-table td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #21262d; font-size: 0.85rem; }
    .data-table tr:hover td { background: #161b22; }
    .data-table .num { text-align: right; font-variant-numeric: tabular-nums; }
    .data-table a { color: #58a6ff; text-decoration: none; }
    .data-table a:hover { text-decoration: underline; }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .section-header h2, .section-header h3 { color: #f0f6fc; margin: 0; }
    .section-header h3 { font-size: 1rem; margin-top: 1.5rem; }

    .inline-form { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
    .input { background: #0d1117; border: 1px solid #30363d; border-radius: 0.375rem; color: #c9d1d9; padding: 0.5rem 0.75rem; font-size: 0.85rem; outline: none; }
    .input:focus { border-color: #58a6ff; }
    .input-wide { min-width: 300px; }
    .btn-primary { background: #238636; border: 1px solid #2ea043; color: #fff; padding: 0.5rem 1rem; border-radius: 0.375rem; cursor: pointer; font-size: 0.85rem; }
    .btn-primary:hover { background: #2ea043; }
    .btn-danger { background: #da3633; border: 1px solid #f85149; color: #fff; padding: 0.35rem 0.75rem; border-radius: 0.375rem; cursor: pointer; font-size: 0.8rem; }
    .btn-danger:hover { background: #f85149; }
    .btn-delete { background: none; border: none; color: #f85149; cursor: pointer; font-size: 0.8rem; padding: 0.2rem 0.4rem; }
    .btn-delete:hover { text-decoration: underline; }

    .hidden { display: none !important; }

    /* ── PythBaddies iframe ── */
    #pythbaddies-frame { width: 100%; border: none; min-height: 85vh; }

    @media (max-width: 600px) {
      .card-grid { grid-template-columns: 1fr; }
      header { flex-direction: column; gap: 0.75rem; text-align: center; }
      .data-table th, .data-table td { padding: 0.4rem; }
      .data-table { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Mission Control Hub</h1>
    <div id="overall-status" class="badge">Loading...</div>
  </header>

  <!-- Top-level tabs -->
  <div class="hub-tabs">
    <button class="hub-tab active" data-tab="payouts">Payouts</button>
    <button class="hub-tab" data-tab="engagement">Engagement</button>
    <button class="hub-tab" data-tab="pythbaddies">PythBaddies</button>
  </div>

  <main>
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- PAYOUTS TAB                                                       -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <div id="tab-payouts" class="hub-section active">
      <div class="filter-bar">
        <label>Status: <select id="filter-status">
          <option value="all">All</option>
          <option value="active">Active</option>
          <option value="closed" selected>Closed</option>
          <option value="exported">Exported</option>
        </select></label>
        <button class="btn btn-export" id="export-csv">Export Payouts CSV</button>
      </div>
      <div id="missions-container">
        <div class="empty-state">Loading missions...</div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- ENGAGEMENT TAB                                                    -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <div id="tab-engagement" class="hub-section">
      <div class="eng-header">
        <div>
          <button id="eng-refresh-btn" class="btn">Refresh</button>
        </div>
        <div id="eng-status-info" class="meta-text"></div>
      </div>

      <div class="eng-nav">
        <button class="eng-nav-btn active" data-view="eng-missions">Missions</button>
        <button class="eng-nav-btn" data-view="eng-leaderboard">Leaderboard</button>
        <button class="eng-nav-btn" data-view="eng-partners">Partners</button>
      </div>

      <div id="eng-filter-bar" class="eng-filter-bar">
        <div class="search-wrap">
          <input type="text" id="eng-search-input" class="search-input" placeholder="Search missions...">
          <span id="eng-search-clear" class="search-clear hidden">&times;</span>
        </div>
        <div id="eng-filter-pills" class="filter-pills">
          <button class="eng-pill active" data-status="all">All</button>
          <button class="eng-pill" data-status="active">Active</button>
          <button class="eng-pill" data-status="exported">Exported</button>
          <button class="eng-pill" data-status="closed">Closed</button>
        </div>
        <div id="eng-sort-control" class="sort-control hidden">
          <label class="sort-label">Sort:</label>
          <select id="eng-sort-select" class="sort-select">
            <option value="engagement-desc">Engagement (high)</option>
            <option value="engagement-asc">Engagement (low)</option>
            <option value="impressions-desc">Impressions (high)</option>
            <option value="impressions-asc">Impressions (low)</option>
            <option value="rate-desc">Rate (high)</option>
            <option value="rate-asc">Rate (low)</option>
            <option value="likes-desc">Likes (high)</option>
            <option value="retweets-desc">Retweets (high)</option>
          </select>
        </div>
        <div id="eng-result-count" class="result-count"></div>
      </div>

      <!-- Engagement sub-views -->
      <div id="eng-missions-view">
        <div id="eng-missions-grid" class="card-grid"></div>
      </div>

      <div id="eng-leaderboard-view" class="hidden">
        <table id="eng-leaderboard-table" class="data-table">
          <thead>
            <tr><th>#</th><th>Author</th><th>Mission</th><th>Impressions</th><th>Likes</th><th>RTs</th><th>Replies</th><th>Engagement</th><th>Rate</th><th>Link</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div id="eng-detail-view" class="hidden">
        <button id="eng-back-btn" class="btn btn-sm">&larr; Back</button>
        <h2 id="eng-detail-title"></h2>
        <div id="eng-detail-stats" class="detail-stats"></div>
        <table id="eng-detail-table" class="data-table">
          <thead>
            <tr><th>#</th><th>Author</th><th>Followers</th><th>Impressions</th><th>Likes</th><th>RTs</th><th>Replies</th><th>Quotes</th><th>Bookmarks</th><th>Rate</th><th>Link</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- Partners -->
      <div id="eng-partners-view" class="hidden">
        <div class="section-header">
          <h2>Partner Tracking</h2>
          <button id="eng-add-partner-btn" class="btn">+ Add Partner</button>
        </div>
        <div id="eng-add-partner-form" class="inline-form hidden">
          <input type="text" id="eng-partner-name" placeholder="Partner name" class="input">
          <input type="text" id="eng-partner-handle" placeholder="@handle (optional)" class="input">
          <button id="eng-save-partner-btn" class="btn-primary">Add</button>
          <button id="eng-cancel-partner-btn" class="btn btn-sm">Cancel</button>
        </div>
        <div id="eng-partners-grid" class="card-grid"></div>
      </div>

      <div id="eng-partner-detail-view" class="hidden">
        <button id="eng-partner-back-btn" class="btn btn-sm">&larr; Back to Partners</button>
        <div class="section-header">
          <h2 id="eng-partner-detail-title"></h2>
          <button id="eng-delete-partner-btn" class="btn-danger">Remove Partner</button>
        </div>
        <div id="eng-partner-detail-stats" class="detail-stats"></div>
        <div class="section-header">
          <h3>Clips</h3>
          <button id="eng-add-clip-btn" class="btn btn-sm">+ Add Clip</button>
        </div>
        <div id="eng-add-clip-form" class="inline-form hidden">
          <input type="text" id="eng-clip-url" placeholder="Tweet/X URL" class="input input-wide">
          <input type="text" id="eng-clip-note" placeholder="Note (optional)" class="input">
          <button id="eng-save-clip-btn" class="btn-primary">Add</button>
          <button id="eng-cancel-clip-btn" class="btn btn-sm">Cancel</button>
        </div>
        <table id="eng-partner-clips-table" class="data-table">
          <thead>
            <tr><th>#</th><th>Posted By</th><th>Followers</th><th>Views</th><th>Likes</th><th>RTs</th><th>Replies</th><th>Quotes</th><th>Bookmarks</th><th>Rate</th><th>Note</th><th>Link</th><th></th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- PYTHBADDIES TAB                                                   -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <div id="tab-pythbaddies" class="hub-section">
      <iframe id="pythbaddies-frame" src="/pythbaddies"></iframe>
    </div>
  </main>

  <footer>
    <p>Mission Control Hub</p>
  </footer>

  <script src="hub.js"></script>
</body>
</html>
